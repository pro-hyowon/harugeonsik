<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>#하루건식 — 맞춤형 건강기능식품 상담</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green-50: #EAF3DE; --green-100: #C0DD97; --green-200: #97C459;
  --green-400: #639922; --green-600: #3B6D11; --green-800: #27500A; --green-900: #173404;
  --teal-50: #E1F5EE; --teal-100: #9FE1CB; --teal-600: #0F6E56; --teal-800: #085041;
  --amber-50: #FAEEDA; --amber-100: #FAC775; --amber-600: #854F0B; --amber-800: #633806;
  --blue-50: #E6F1FB; --blue-100: #B5D4F4; --blue-600: #185FA5; --blue-800: #0C447C;
  --red-50: #FCEBEB; --red-100: #F7C1C1; --red-600: #A32D2D; --red-800: #791F1F;
  --gray-50: #F1EFE8; --gray-100: #D3D1C7; --gray-200: #B4B2A9;
  --gray-600: #5F5E5A; --gray-800: #444441; --gray-900: #2C2C2A;

  --bg: #FAFAF8;
  --bg-surface: #FFFFFF;
  --bg-muted: #F4F2EC;
  --text-primary: #1A1A18;
  --text-secondary: #5F5E5A;
  --text-muted: #9A9892;
  --border: rgba(0,0,0,0.1);
  --border-medium: rgba(0,0,0,0.18);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #18181A; --bg-surface: #222224; --bg-muted: #2A2A2C;
    --text-primary: #F0EFE8; --text-secondary: #9A9892;
    --text-muted: #636260; --border: rgba(255,255,255,0.1);
    --border-medium: rgba(255,255,255,0.18);
    --green-50: #0F2208; --green-100: #1C3D0F;
    --amber-50: #1A1000; --amber-100: #2C1C00;
    --blue-50: #060F1A; --blue-100: #0C1E33;
    --teal-50: #04120E; --teal-100: #081E18;
  }
}

html, body { height: 100%; font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text-primary); }

.app {
  display: grid;
  grid-template-columns: 300px 1fr;
  height: 100vh;
  max-width: 1280px;
  margin: 0 auto;
  background: var(--bg-surface);
  box-shadow: var(--shadow-md);
}

/* ─── SIDEBAR ─── */
.sidebar {
  display: flex;
  flex-direction: column;
  background: var(--bg-muted);
  border-right: 1px solid var(--border);
  overflow: hidden;
}

.sidebar-logo {
  padding: 22px 20px 18px;
  border-bottom: 1px solid var(--border);
}

.logo-row {
  display: flex; align-items: center; gap: 10px; margin-bottom: 4px;
}

.logo-mark {
  width: 36px; height: 36px;
  background: var(--green-600);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 18px;
  flex-shrink: 0;
}

.logo-title {
  font-family: 'DM Serif Display', serif;
  font-size: 20px;
  color: var(--text-primary);
}

.logo-sub {
  font-size: 11px;
  color: var(--text-muted);
  padding-left: 46px;
}

/* Profile */
.profile-section {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}

.section-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-bottom: 10px;
}

.profile-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 12px 14px;
}

.profile-name { font-size: 13px; font-weight: 500; color: var(--text-primary); margin-bottom: 8px; }

.tags { display: flex; flex-wrap: wrap; gap: 5px; }

.tag {
  font-size: 10px; font-weight: 500;
  padding: 3px 8px; border-radius: 20px;
}
.tag-warn { background: var(--amber-50); color: var(--amber-800); }
.tag-info { background: var(--blue-50); color: var(--blue-800); }
.tag-ok   { background: var(--green-50); color: var(--green-800); }
.tag-bad  { background: var(--red-50);   color: var(--red-800); }

/* Quick Topics */
.topics-section {
  padding: 16px 20px;
  flex: 1;
  overflow-y: auto;
}

.topic-btn {
  display: flex; align-items: center; gap: 9px;
  width: 100%;
  padding: 8px 10px;
  border: none; background: transparent;
  border-radius: var(--radius-sm);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 12px; color: var(--text-secondary);
  cursor: pointer; text-align: left;
  transition: background 0.12s, color 0.12s;
  margin-bottom: 2px;
}
.topic-btn:hover { background: var(--bg-surface); color: var(--text-primary); }
.topic-btn i { font-size: 15px; color: var(--green-600); flex-shrink: 0; }

/* Health Score */
.score-section {
  padding: 14px 20px;
  border-top: 1px solid var(--border);
}
.score-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.score-label { font-size: 11px; color: var(--text-secondary); font-weight: 500; }
.score-num { font-size: 13px; font-weight: 700; color: var(--green-600); }
.score-bar { height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; }
.score-fill { height: 100%; width: 68%; background: var(--green-600); border-radius: 99px; transition: width 0.6s ease; }
.score-hint { font-size: 10px; color: var(--text-muted); margin-top: 4px; }

/* ─── CHAT AREA ─── */
.chat-area { display: flex; flex-direction: column; height: 100%; overflow: hidden; }

.chat-header {
  padding: 14px 22px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  background: var(--bg-surface);
  flex-shrink: 0;
}

.header-left { display: flex; align-items: center; gap: 12px; }

.ai-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--green-50); border: 1.5px solid var(--green-100);
  display: flex; align-items: center; justify-content: center;
  color: var(--green-600); font-size: 17px;
}

.ai-name { font-size: 14px; font-weight: 600; color: var(--text-primary); }
.ai-status { font-size: 11px; color: var(--green-600); display: flex; align-items: center; gap: 5px; }
.dot { width: 6px; height: 6px; background: var(--green-400); border-radius: 50%; animation: pulse 2s infinite; }

@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

.header-actions { display: flex; gap: 6px; }

.icon-btn {
  width: 34px; height: 34px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer; font-size: 16px; color: var(--text-secondary);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.12s;
}
.icon-btn:hover { background: var(--bg-muted); color: var(--text-primary); border-color: var(--border-medium); }

/* Messages */
.messages {
  flex: 1; overflow-y: auto;
  padding: 24px 24px 16px;
  display: flex; flex-direction: column; gap: 18px;
}

.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.msg { display: flex; gap: 10px; max-width: 85%; animation: fadeUp 0.22s ease; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.msg.user { align-self: flex-end; flex-direction: row-reverse; }

.msg-av {
  width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; margin-top: 2px;
}
.msg-av.ai  { background: var(--green-50); color: var(--green-600); border: 1px solid var(--green-100); }
.msg-av.usr { background: var(--bg-muted); color: var(--text-secondary); border: 1px solid var(--border); }

.bubble {
  padding: 11px 15px;
  font-size: 13.5px; line-height: 1.7;
  color: var(--text-primary);
}
.msg.ai  .bubble { background: var(--bg-muted); border: 1px solid var(--border); border-radius: 4px 14px 14px 14px; }
.msg.user .bubble { background: var(--green-600); color: #fff; border-radius: 14px 4px 14px 14px; }

/* File preview badge in message */
.file-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25);
  border-radius: var(--radius-sm); padding: 5px 10px;
  font-size: 12px; margin-bottom: 6px; max-width: 240px;
}
.file-badge i { font-size: 15px; }

/* Analysis result cards */
.analysis-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px;
}
.analysis-card {
  background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 10px 12px;
}
.analysis-card-title { font-size: 11px; font-weight: 600; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
.analysis-card-val { font-size: 18px; font-weight: 700; color: var(--text-primary); }
.analysis-card-val.warn  { color: var(--amber-600); }
.analysis-card-val.bad   { color: var(--red-600); }
.analysis-card-val.ok    { color: var(--green-600); }
.analysis-card-sub { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

/* Supplement recommendation cards */
.supp-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px;
}
.supp-card {
  background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 10px 12px;
  cursor: pointer; transition: all 0.15s;
}
.supp-card:hover { border-color: var(--green-200); background: var(--green-50); }
.supp-name { font-size: 12px; font-weight: 600; color: var(--text-primary); margin-bottom: 3px; }
.supp-reason { font-size: 11px; color: var(--text-secondary); line-height: 1.4; }
.supp-badge {
  display: inline-block; font-size: 10px; font-weight: 600;
  padding: 2px 7px; border-radius: 20px; margin-top: 5px;
}
.badge-strong { background: var(--green-50); color: var(--green-800); }
.badge-recommended { background: var(--blue-50); color: var(--blue-800); }
.badge-consider { background: var(--amber-50); color: var(--amber-800); }

/* Typing */
.typing-wrap { display: flex; gap: 10px; }
.typing-bubble {
  display: flex; gap: 5px; align-items: center;
  background: var(--bg-muted); border: 1px solid var(--border);
  border-radius: 4px 14px 14px 14px; padding: 12px 16px;
}
.typing-bubble span {
  width: 7px; height: 7px; background: var(--text-muted);
  border-radius: 50%; animation: bounce 1.1s infinite;
}
.typing-bubble span:nth-child(2) { animation-delay: 0.18s; }
.typing-bubble span:nth-child(3) { animation-delay: 0.36s; }
@keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }

/* ─── INPUT AREA ─── */
.input-area {
  padding: 14px 22px 18px;
  border-top: 1px solid var(--border);
  background: var(--bg-surface);
  flex-shrink: 0;
}

/* Upload zone */
.upload-zone {
  border: 1.5px dashed var(--border-medium);
  border-radius: var(--radius-md);
  padding: 18px 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  background: var(--bg-muted);
  margin-bottom: 12px;
  position: relative;
}
.upload-zone:hover, .upload-zone.drag-over {
  border-color: var(--green-200);
  background: var(--green-50);
}
.upload-zone input[type=file] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
}
.upload-icon { font-size: 26px; color: var(--green-600); margin-bottom: 6px; }
.upload-title { font-size: 13px; font-weight: 500; color: var(--text-primary); margin-bottom: 3px; }
.upload-sub { font-size: 11px; color: var(--text-muted); }
.upload-formats {
  display: flex; justify-content: center; gap: 6px; margin-top: 10px; flex-wrap: wrap;
}
.fmt-badge {
  font-size: 10px; font-weight: 600; padding: 2px 8px;
  border-radius: 20px; border: 1px solid var(--border);
  color: var(--text-secondary); background: var(--bg-surface);
}

/* File queue */
.file-queue {
  display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px;
}
.file-item {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg-muted); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 8px 12px;
}
.file-icon { font-size: 18px; flex-shrink: 0; }
.file-icon.pdf   { color: #E24B4A; }
.file-icon.img   { color: var(--blue-600); }
.file-icon.txt   { color: var(--green-600); }
.file-icon.hwp   { color: var(--amber-600); }
.file-icon.other { color: var(--text-muted); }
.file-info { flex: 1; min-width: 0; }
.file-name { font-size: 12px; font-weight: 500; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.file-size { font-size: 10px; color: var(--text-muted); }
.file-status { font-size: 11px; font-weight: 500; }
.file-status.ready    { color: var(--green-600); }
.file-status.loading  { color: var(--amber-600); }
.file-status.error    { color: var(--red-600); }
.file-remove { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 16px; padding: 2px; border-radius: 4px; display: flex; align-items: center; }
.file-remove:hover { color: var(--red-600); background: var(--red-50); }

/* Text input row */
.input-row { display: flex; gap: 8px; align-items: flex-end; }

.msg-input {
  flex: 1;
  padding: 10px 14px;
  font-family: 'Noto Sans KR', sans-serif; font-size: 13px;
  background: var(--bg-muted); border: 1px solid var(--border);
  border-radius: var(--radius-md); color: var(--text-primary);
  resize: none; min-height: 42px; max-height: 110px;
  outline: none; line-height: 1.5; transition: border-color 0.15s;
}
.msg-input:focus { border-color: var(--green-200); }
.msg-input::placeholder { color: var(--text-muted); }

.send-btn {
  width: 42px; height: 42px;
  background: var(--green-600); border: none;
  border-radius: var(--radius-sm); color: #fff; font-size: 17px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background 0.12s, transform 0.1s;
}
.send-btn:hover { background: var(--green-800); }
.send-btn:active { transform: scale(0.94); }
.send-btn:disabled { background: var(--gray-200); cursor: not-allowed; }

.disclaimer {
  font-size: 10px; color: var(--text-muted);
  text-align: center; margin-top: 8px;
}

/* Tooltip */
[title] { position: relative; }

/* Scrollbar */
.topics-section::-webkit-scrollbar { width: 3px; }
.topics-section::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div class="app">
  <!-- ─── SIDEBAR ─── -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-row">
        <div class="logo-mark"><i class="ti ti-leaf" aria-hidden="true"></i></div>
        <span class="logo-title">#하루건식</span>
      </div>
      <div class="logo-sub">건강검진 기반 맞춤형 영양 상담</div>
    </div>

    <div class="profile-section">
      <div class="section-label">내 건강 프로필</div>
      <div class="profile-card">
        <div class="profile-name">김지수 · 45세 · 여성</div>
        <div class="tags">
          <span class="tag tag-warn">고지혈증 경계</span>
          <span class="tag tag-warn">비타민D 부족</span>
          <span class="tag tag-info">혈압 정상</span>
          <span class="tag tag-ok">혈당 정상</span>
        </div>
      </div>
    </div>

    <div class="topics-section">
      <div class="section-label">빠른 상담</div>
      <button class="topic-btn" onclick="quickAsk('내 건강검진 결과를 종합 분석하고 맞춤 영양제를 추천해주세요')">
        <i class="ti ti-report-medical" aria-hidden="true"></i>검진 결과 종합 분석
      </button>
      <button class="topic-btn" onclick="quickAsk('콜레스테롤 수치 개선에 효과적인 영양제와 복용법을 알려주세요')">
        <i class="ti ti-heart-rate-monitor" aria-hidden="true"></i>콜레스테롤 관리
      </button>
      <button class="topic-btn" onclick="quickAsk('비타민D 결핍 개선을 위한 적정 복용량과 주의사항은?')">
        <i class="ti ti-sun" aria-hidden="true"></i>비타민D 보충
      </button>
      <button class="topic-btn" onclick="quickAsk('현재 처방받은 약과 영양제 간의 상호작용을 확인해주세요')">
        <i class="ti ti-alert-triangle" aria-hidden="true"></i>약물·영양제 상호작용
      </button>
      <button class="topic-btn" onclick="quickAsk('면역력 강화를 위한 영양제 조합을 추천해주세요')">
        <i class="ti ti-shield-check" aria-hidden="true"></i>면역력 강화
      </button>
      <button class="topic-btn" onclick="quickAsk('영양제 복용 시간과 식전·식후 여부를 정리해주세요')">
        <i class="ti ti-clock" aria-hidden="true"></i>복용 시간 & 방법
      </button>
      <button class="topic-btn" onclick="quickAsk('갱년기 여성에게 특히 필요한 영양소와 영양제를 알려주세요')">
        <i class="ti ti-woman" aria-hidden="true"></i>갱년기 여성 영양
      </button>
      <button class="topic-btn" onclick="quickAsk('뼈 건강과 골다공증 예방을 위한 영양소는?')">
        <i class="ti ti-bone" aria-hidden="true"></i>뼈 건강
      </button>
    </div>

    <div class="score-section">
      <div class="score-row">
        <span class="score-label">종합 건강 점수</span>
        <span class="score-num">68 / 100</span>
      </div>
      <div class="score-bar"><div class="score-fill" id="scoreFill"></div></div>
      <div class="score-hint">검진 결과 업로드 시 자동 갱신됩니다</div>
    </div>
  </aside>

  <!-- ─── CHAT AREA ─── -->
  <div class="chat-area">
    <div class="chat-header">
      <div class="header-left">
        <div class="ai-avatar"><i class="ti ti-robot" aria-hidden="true"></i></div>
        <div>
          <div class="ai-name">#하루건식</div>
          <div class="ai-status"><span class="dot"></span>상담 준비 완료</div>
        </div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" title="대화 내보내기" onclick="exportChat()">
          <i class="ti ti-download" aria-hidden="true"></i>
        </button>
        <button class="icon-btn" title="상담 초기화" onclick="resetChat()">
          <i class="ti ti-refresh" aria-hidden="true"></i>
        </button>
      </div>
    </div>

    <div class="messages" id="messages">
      <!-- Welcome message injected by JS -->
    </div>

    <!-- ─── INPUT AREA ─── -->
    <div class="input-area">
      <!-- Drop Zone -->
      <div class="upload-zone" id="dropZone" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
        <input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png,.txt,.hwp,.docx,.xlsx,.csv" multiple onchange="onFileSelect(event)">
        <div class="upload-icon"><i class="ti ti-cloud-upload" aria-hidden="true"></i></div>
        <div class="upload-title">건강검진 결과 파일을 업로드하세요</div>
        <div class="upload-sub">클릭하거나 파일을 여기로 드래그하세요</div>
        <div class="upload-formats">
          <span class="fmt-badge">PDF</span>
          <span class="fmt-badge">JPG / PNG</span>
          <span class="fmt-badge">TXT</span>
          <span class="fmt-badge">HWP</span>
          <span class="fmt-badge">DOCX</span>
          <span class="fmt-badge">XLSX</span>
        </div>
      </div>

      <!-- File Queue -->
      <div class="file-queue" id="fileQueue"></div>

      <!-- Text Input -->
      <div class="input-row">
        <textarea
          class="msg-input" id="chatInput"
          placeholder="질문을 입력하거나 파일을 업로드해 분석을 요청하세요..."
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <i class="ti ti-send" aria-hidden="true"></i>
        </button>
      </div>
      <div class="disclaimer">본 서비스는 의학적 진단을 대체하지 않습니다. 건강 이상 시 반드시 전문의와 상담하세요.</div>
    </div>
  </div>
</div>

<script>
// ─── STATE ───
const SYSTEM_PROMPT = `당신은 #하루건식 AI, 건강기능식품 전문 상담 AI입니다.

[역할]
- 건강검진 결과 문서(PDF, 이미지, TXT, HWP 등)를 분석하고 수치를 해석합니다
- 분석된 수치에 기반하여 맞춤형 건강기능식품을 과학적 근거와 함께 추천합니다
- 영양소별 권장 복용량, 복용 시간, 주의사항, 상호작용을 명확히 안내합니다
- 수치 개선을 위한 식이·생활습관 조언도 함께 제공합니다

[파일 분석 시 포함할 내용]
1. 주요 검사 수치 요약 (정상/경계/이상 구분)
2. 이상 수치에 대한 의학적 의미 설명
3. 맞춤 영양제 우선순위 추천 (용량·복용법 포함)
4. 주의해야 할 사항 및 전문의 상담 권고 항목

[답변 스타일]
- 한국어로 친근하고 전문적으로 답변
- 수치를 구체적으로 언급하여 설명
- 복잡한 내용은 단계별로 구조화
- 심각한 이상 수치는 반드시 전문의 상담 권고
- 답변은 핵심 중심으로 명확하게`;

let messages = [];
let pendingFiles = [];
let isLoading = false;

// ─── INIT ───
window.addEventListener('DOMContentLoaded', () => {
  addWelcomeMessage();
});

function addWelcomeMessage() {
  const container = document.getElementById('messages');
  container.innerHTML = '';
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.innerHTML = `
    <div class="msg-av ai"><i class="ti ti-leaf" aria-hidden="true"></i></div>
    <div>
      <div class="bubble">
        안녕하세요! 저는 <strong>#하루건식</strong> AI 건강 상담사입니다. 🌿<br><br>
        건강검진 결과 파일을 업로드하거나 수치를 직접 입력해 주시면, 맞춤형 건강기능식품을 추천해 드립니다.<br><br>
        <strong>지원 파일 형식:</strong> PDF · JPG/PNG · TXT · HWP · DOCX · XLSX
      </div>
      <div class="supp-grid">
        <div class="supp-card" onclick="quickAsk('오메가3 효능과 고지혈증 개선 복용법을 알려주세요')">
          <div class="supp-name">🐟 오메가3</div>
          <div class="supp-reason">LDL 콜레스테롤 경계 수치 관리</div>
          <span class="supp-badge badge-strong">강력 권장</span>
        </div>
        <div class="supp-card" onclick="quickAsk('비타민D3 결핍 시 적정 복용량과 K2 병용에 대해 알려주세요')">
          <div class="supp-name">☀️ 비타민D3 + K2</div>
          <div class="supp-reason">검진상 결핍 수치 보충</div>
          <span class="supp-badge badge-strong">필수 보충</span>
        </div>
        <div class="supp-card" onclick="quickAsk('마그네슘 글리시네이트의 효능과 복용법을 알려주세요')">
          <div class="supp-name">💊 마그네슘</div>
          <div class="supp-reason">심혈관 건강 및 수면 개선</div>
          <span class="supp-badge badge-recommended">권장</span>
        </div>
        <div class="supp-card" onclick="quickAsk('코엔자임Q10의 항산화 효과와 복용량을 알려주세요')">
          <div class="supp-name">⚡ 코엔자임Q10</div>
          <div class="supp-reason">항산화 및 에너지 대사 지원</div>
          <span class="supp-badge badge-consider">고려</span>
        </div>
      </div>
    </div>`;
  container.appendChild(div);
}

// ─── FILE HANDLING ───
function getFileIconClass(name) {
  const ext = name.split('.').pop().toLowerCase();
  if (ext === 'pdf') return 'pdf';
  if (['jpg','jpeg','png','gif','webp'].includes(ext)) return 'img';
  if (ext === 'txt') return 'txt';
  if (['hwp','hwpx'].includes(ext)) return 'hwp';
  return 'other';
}

function getFileIcon(name) {
  const ext = name.split('.').pop().toLowerCase();
  if (ext === 'pdf') return 'ti-file-type-pdf';
  if (['jpg','jpeg','png','gif','webp'].includes(ext)) return 'ti-photo';
  if (ext === 'txt') return 'ti-file-text';
  if (['hwp','hwpx'].includes(ext)) return 'ti-file-description';
  if (['docx','doc'].includes(ext)) return 'ti-file-word';
  if (['xlsx','xls','csv'].includes(ext)) return 'ti-file-spreadsheet';
  return 'ti-file';
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/(1024*1024)).toFixed(1) + ' MB';
}

function onFileSelect(e) {
  addFiles(Array.from(e.target.files));
  e.target.value = '';
}

function onDragOver(e) {
  e.preventDefault();
  document.getElementById('dropZone').classList.add('drag-over');
}

function onDragLeave() {
  document.getElementById('dropZone').classList.remove('drag-over');
}

function onDrop(e) {
  e.preventDefault();
  document.getElementById('dropZone').classList.remove('drag-over');
  addFiles(Array.from(e.dataTransfer.files));
}

function addFiles(files) {
  files.forEach(file => {
    pendingFiles.push({ file, id: Date.now() + Math.random(), status: 'ready' });
  });
  renderFileQueue();
}

function removeFile(id) {
  pendingFiles = pendingFiles.filter(f => f.id !== id);
  renderFileQueue();
}

function renderFileQueue() {
  const queue = document.getElementById('fileQueue');
  queue.innerHTML = '';
  pendingFiles.forEach(f => {
    const div = document.createElement('div');
    div.className = 'file-item';
    const iconClass = getFileIconClass(f.file.name);
    const icon = getFileIcon(f.file.name);
    const statusText = f.status === 'ready' ? '분석 대기' : f.status === 'loading' ? '처리 중...' : '오류';
    div.innerHTML = `
      <i class="ti ${icon} file-icon ${iconClass}" aria-hidden="true"></i>
      <div class="file-info">
        <div class="file-name" title="${f.file.name}">${f.file.name}</div>
        <div class="file-size">${formatSize(f.file.size)}</div>
      </div>
      <span class="file-status ${f.status}">${statusText}</span>
      <button class="file-remove" onclick="removeFile(${f.id})" title="제거">
        <i class="ti ti-x" aria-hidden="true"></i>
      </button>`;
    queue.appendChild(div);
  });
}

// ─── FILE → BASE64 / TEXT ───
async function fileToContent(fileObj) {
  const file = fileObj.file;
  const ext = file.name.split('.').pop().toLowerCase();
  const name = file.name;

  // Images → base64 vision input
  if (['jpg','jpeg','png','gif','webp'].includes(ext)) {
    const b64 = await toBase64(file);
    const mediaType = ext === 'jpg' ? 'image/jpeg' : `image/${ext}`;
    return {
      type: 'image',
      source: { type: 'base64', media_type: mediaType, data: b64.split(',')[1] },
      label: name
    };
  }

  // PDF → base64 document
  if (ext === 'pdf') {
    const b64 = await toBase64(file);
    return {
      type: 'document',
      source: { type: 'base64', media_type: 'application/pdf', data: b64.split(',')[1] },
      label: name
    };
  }

  // Text-based files → read as text
  const text = await file.text();
  return { type: 'text_file', text, label: name };
}

function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

// ─── CHAT ───
function quickAsk(text) {
  document.getElementById('chatInput').value = text;
  sendMessage();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 110) + 'px';
}

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  const hasFiles = pendingFiles.length > 0;
  if (!text && !hasFiles) return;

  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  input.value = '';
  input.style.height = 'auto';

  // ── User bubble ──
  addUserMessage(text, pendingFiles.map(f => f.file.name));

  // ── Process files ──
  let fileContents = [];
  if (hasFiles) {
    pendingFiles.forEach(f => { f.status = 'loading'; });
    renderFileQueue();
    try {
      fileContents = await Promise.all(pendingFiles.map(fileToContent));
    } catch(err) {
      pendingFiles.forEach(f => { f.status = 'error'; });
      renderFileQueue();
    }
    pendingFiles = [];
    renderFileQueue();
  }

  // ── Build API message content ──
  const userContent = [];

  fileContents.forEach(fc => {
    if (fc.type === 'image') {
      userContent.push({ type: 'image', source: fc.source });
      userContent.push({ type: 'text', text: `위 이미지는 건강검진 결과 파일(${fc.label})입니다.` });
    } else if (fc.type === 'document') {
      userContent.push({ type: 'document', source: fc.source });
      userContent.push({ type: 'text', text: `위 PDF 문서는 건강검진 결과 파일(${fc.label})입니다.` });
    } else if (fc.type === 'text_file') {
      userContent.push({ type: 'text', text: `[파일: ${fc.label}]\n\n${fc.text}` });
    }
  });

  const promptText = text || (hasFiles ? '이 건강검진 결과를 분석하고 맞춤형 영양제를 추천해주세요.' : '');
  userContent.push({ type: 'text', text: promptText });

  messages.push({ role: 'user', content: userContent });

  // ── Typing indicator ──
  showTyping();

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages
      })
    });

    const data = await response.json();
    removeTyping();

    const reply = data.content?.[0]?.text || '응답을 받지 못했습니다. 다시 시도해 주세요.';
    addAIMessage(reply);
    messages.push({ role: 'assistant', content: reply });

  } catch(err) {
    removeTyping();
    addAIMessage('연결에 문제가 발생했습니다. 잠시 후 다시 시도해 주세요.');
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
}

function addUserMessage(text, fileNames) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg user';

  let fileBadges = '';
  fileNames.forEach(name => {
    const icon = getFileIcon(name);
    fileBadges += `<div class="file-badge"><i class="ti ${icon}" aria-hidden="true"></i>${name}</div>`;
  });

  div.innerHTML = `
    <div class="msg-av usr"><i class="ti ti-user" aria-hidden="true"></i></div>
    <div class="bubble">
      ${fileBadges}
      ${text ? `<div>${text}</div>` : ''}
    </div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function addAIMessage(text) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ai';
  const formatted = text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>')
    .replace(/^##\s(.+)/gm, '<br><strong style="font-size:14px">$1</strong><br>')
    .replace(/^•\s/gm, '&nbsp;&nbsp;• ');
  div.innerHTML = `
    <div class="msg-av ai"><i class="ti ti-leaf" aria-hidden="true"></i></div>
    <div class="bubble">${formatted}</div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function showTyping() {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ai'; div.id = 'typing';
  div.innerHTML = `
    <div class="msg-av ai"><i class="ti ti-leaf" aria-hidden="true"></i></div>
    <div class="typing-bubble"><span></span><span></span><span></span></div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function resetChat() {
  if (!confirm('상담 내용을 초기화하시겠습니까?')) return;
  messages = [];
  pendingFiles = [];
  renderFileQueue();
  addWelcomeMessage();
}

function exportChat() {
  const lines = [];
  lines.push('#하루건식 상담 내역');
  lines.push('생성일시: ' + new Date().toLocaleString('ko-KR'));
  lines.push('──────────────────────');
  messages.forEach(m => {
    const role = m.role === 'user' ? '사용자' : '#하루건식';
    const content = typeof m.content === 'string' ? m.content
      : m.content.filter(c => c.type === 'text').map(c => c.text).join('\n');
    lines.push(`[${role}]\n${content}\n`);
  });
  const blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'harugeonsik-상담내역.txt';
  a.click();
}
</script>
